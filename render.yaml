services:
  - type: web
    name: gemmabot
    env: docker
    repo: https://github.com/jwalin-shah/gemmabot
    plan: free
    region: oregon
    autoDeploy: true
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    port: 8002
    envVars:
      - key: CEREBRAS_API_KEY
        sync: false
      - key: REASONING_EFFORT
        value: ""
      - key: DEMO_IMAGE_PATH
        value: examples/images/workspace.jpg
